<!DOCTYPE html>
<html lang="en">

<head>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<meta charset="UTF-8">
<title>Register | StockSense</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(135deg,#387ed1,#4aa3ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card h2{
text-align:center;
margin-bottom:25px;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#387ed1;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2f6cb5;
}

#stockCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#0f172a;
}

/* LINK */

.link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.link a{
color:#387ed1;
text-decoration:none;
}

</style>

</head>


<body>

<canvas id="stockCanvas"></canvas>
<div class="card">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Full Name" required>

<input type="text" name="userid" placeholder="User ID" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<button type="submit">Register</button>

</form>

<div class="link">
Already have an account?
<a href="/login">Login</a>
</div>

</div>

<script>

const canvas = document.getElementById("stockCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stocks = [];

for(let i=0;i<80;i++){
stocks.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
speed: Math.random()*1.5 + 0.5,
value: (Math.random()*2000).toFixed(2)
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#22c55e";
ctx.font = "12px monospace";

stocks.forEach(s=>{

ctx.fillText(s.value, s.x, s.y);

s.y -= s.speed;

if(s.y < 0){
s.y = canvas.height;
s.value = (Math.random()*2000).toFixed(2);
}

});

requestAnimationFrame(draw);
}

draw();

</script>

<script>
setTimeout(() => {
  document.querySelectorAll('.flash').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(100%)';
    setTimeout(() => el.remove(), 300);
  });
}, 3000);
</script>

</body>
</html>
